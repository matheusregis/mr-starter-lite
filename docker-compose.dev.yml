services:
  mongodb:
    image: mongo:latest
    container_name: mr-starter-mongodb
    restart: unless-stopped
    command: ["mongod", "--quiet"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme
    volumes:
      - mongodb_data:/data/db
    networks:
      - mr-starter-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
      network: host
    container_name: mr-starter-backend-dev
    ports:
      - "3001:3001"
      - "9229:9229" # debug port
    env_file:
      - ./backend/.env
    environment:
      # Sobrescreve só o que precisa ser diferente em dev
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:changeme@mongodb:27017/mr_starter_dev?authSource=admin
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
        - action: rebuild
          path: ./backend/package.json
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mr-starter-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
      network: host
    container_name: mr-starter-frontend-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_TELEMETRY_DISABLED: "1"
    develop:
      watch:
        - action: sync
          path: ./frontend/app
          target: /app/app
        - action: sync
          path: ./frontend/components
          target: /app/components
        - action: sync
          path: ./frontend/contexts
          target: /app/contexts
        - action: sync
          path: ./frontend/lib
          target: /app/lib
        - action: sync
          path: ./frontend/types
          target: /app/types
        - action: rebuild
          path: ./frontend/package.json
    depends_on:
      - backend
    networks:
      - mr-starter-network

volumes:
  mongodb_data:
    driver: local

networks:
  mr-starter-network:
    driver: bridge
